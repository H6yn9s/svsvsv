<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🥒 Cucumber Tap · Telegram</title>
    <!-- Подключаем шрифт, похожий на Telegram -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0b1622; /* глубокий тёмно-синий, как ночной Telegram */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        /* Основная карточка — как окно Telegram */
        .telegram-app {
            max-width: 420px;
            width: 100%;
            background: #17212b;       /* фон чата Telegram */
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px #2b3a4a inset;
            padding: 18px 16px 24px;
            color: #e3eef8;
        }

        /* --- ПРОФИЛЬ (шапка) --- */
        .profile-section {
            background: #1e2c3a;
            border-radius: 24px;
            padding: 16px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: inset 0 1px 2px #2e4255, 0 6px 0 #0f1a24;
            border-bottom: 1px solid #304a5e;
        }
        .avatar {
            background: #3a6ea5;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 0 #1f364b, inset 0 -2px 0 #5f8db0;
            border: 2px solid #6e9ac7;
        }
        .profile-info {
            flex: 1;
        }
        .tg-username {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tg-username span {
            background: #2b5278;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 30px;
            color: #bdd6ff;
        }
        .playtime-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.9rem;
            color: #a3c1da;
        }
        .playtime-row i {
            font-size: 1.1rem;
        }
        .balance-badge {
            background: #253d52;
            border-radius: 30px;
            padding: 8px 14px;
            box-shadow: inset 0 1px 2px #2e4b64;
            font-weight: 700;
            font-size: 1.2rem;
            color: #f5e37a;
            border-bottom: 3px solid #5a7940;
        }

        /* --- СЧЁТЧИК И ПАНЕЛЬ --- */
        .stats-panel {
            background: #1e2c3a;
            border-radius: 30px;
            padding: 12px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 1px 4px #2e4255, 0 5px 0 #0f1a24;
        }
        .cucumber-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0e1a26;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.8rem;
            color: #c5e0b4;
            box-shadow: inset 0 2px 5px #00000055;
        }
        .passive-indicator {
            background: #1b3347;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            color: #b1d0f0;
            border-bottom: 3px solid #346792;
        }

        /* --- СКИНЫ (селектор) --- */
        .skins-title {
            display: flex;
            align-items: baseline;
            margin: 5px 0 12px 4px;
            font-weight: 600;
            color: #bdd3e8;
        }
        .skin-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: space-around;
        }
        .skin-option {
            background: #1b2936;
            border-radius: 60px;
            padding: 10px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 2px 3px #0e1a24, 0 6px 0 #0c1722;
            border-bottom: 1px solid #2f5570;
            cursor: pointer;
            transition: all 0.1s;
            border: 1px solid transparent;
        }
        .skin-option.active {
            background: #27506b;
            box-shadow: inset 0 2px 5px #0c1a26, 0 4px 0 #123044;
            transform: translateY(2px);
            border: 1px solid #6da5d3;
        }
        .skin-emoji {
            font-size: 42px;
            filter: drop-shadow(0 6px 4px #00000050);
        }
        .skin-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #cbdaea;
            margin-top: 4px;
        }
        .skin-price {
            font-size: 0.8rem;
            background: #142b3c;
            padding: 2px 12px;
            border-radius: 20px;
            margin-top: 4px;
            color: #fed976;
        }

        /* --- ОГУРЕЦ ДЛЯ ТАПА --- */
        .tap-area {
            display: flex;
            justify-content: center;
            margin: 10px 0 12px;
        }
        .cucumber-tap {
            background: radial-gradient(circle at 30% 25%, #2c5432, #194d21);
            width: 210px;
            height: 210px;
            border-radius: 48% 52% 45% 55% / 55% 42% 58% 45%;
            box-shadow: 0 18px 0 #0d2c12, 0 25px 30px #00000070, inset 0 -12px 8px #071a0b;
            border: 5px solid #4f8e3c;
            cursor: pointer;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-4deg);
        }
        .cucumber-tap:active {
            transform: scale(0.93) rotate(-2deg);
            box-shadow: 0 8px 0 #0b2e10, 0 18px 25px black, inset 0 -8px 8px #051a07;
        }
        .tap-emoji {
            font-size: 118px;
            line-height: 1;
            filter: drop-shadow(4px 14px 6px #072005);
        }
        .click-badge {
            text-align: center;
            margin: 5px 0 5px;
            font-weight: 600;
            background: #1b3f4e;
            width: fit-content;
            margin-inline: auto;
            padding: 6px 28px;
            border-radius: 50px;
            color: #d4edda;
            box-shadow: inset 0 1px 3px #3f7897, 0 4px 0 #0c293b;
        }

        /* --- УЛУЧШЕНИЯ (карточки) --- */
        .upgrades-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 22px 0 14px 6px;
            color: #cbe4fe;
            text-shadow: 0 2px 3px black;
        }
        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .upgrade-item {
            background: #1e2f3f;
            border-radius: 22px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 0 #0f1f2b, 0 4px 10px #00000055;
            border-bottom: 1px solid #3b607a;
        }
        .upgrade-left {
            display: flex;
            flex-direction: column;
        }
        .upgrade-title {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .upgrade-desc {
            font-size: 0.85rem;
            opacity: 0.9;
            color: #b5d0e6;
        }
        .upgrade-cost {
            margin-top: 6px;
            font-weight: 700;
            color: #fed976;
        }
        .buy-button {
            background: #2a5c7a;
            border: none;
            border-radius: 40px;
            padding: 14px 18px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #ecf9ff;
            box-shadow: 0 6px 0 #123144, 0 2px 6px black;
            cursor: pointer;
            min-width: 100px;
            text-align: center;
            border-bottom: 2px solid #73addb;
            transition: 0.05s;
            letter-spacing: 0.5px;
        }
        .buy-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0e2633, 0 2px 6px black;
        }
        .buy-button.disabled {
            opacity: 0.45;
            filter: grayscale(0.6);
            pointer-events: none;
            transform: translateY(2px);
            box-shadow: 0 4px 0 #0a1f2c;
            background: #3c5368;
        }

        /* Кнопка сброса */
        .reset-block {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }
        .reset-btn {
            background: #2b3b4b;
            border: none;
            color: #dde9f5;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 5px 0 #14222e;
            cursor: pointer;
            border-bottom: 2px solid #5f7f9c;
        }
        .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f1e28;
        }

        .footer-note {
            text-align: center;
            margin-top: 14px;
            color: #7b9eb3;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="telegram-app">
    <!-- Профиль Telegram -->
    <div class="profile-section">
        <div class="avatar">👤</div>
        <div class="profile-info">
            <div class="tg-username">
                @cucumber_king <span>TG</span>
            </div>
            <div class="playtime-row">
                <span>⏱️</span> <span id="playtimeDisplay">0 мин</span>
                <span>•</span>
                <span>🥒 <span id="totalEarnedDisplay">0</span></span>
            </div>
        </div>
        <div class="balance-badge" id="balanceShort">0</div>
    </div>

    <!-- Счёт -->
    <div class="stats-panel">
        <div class="cucumber-counter">
            <span>🥒</span> <span id="cucumberCounter">0</span>
        </div>
        <div class="passive-indicator" id="perSecondDisplay">
            ⏱️ 0/сек
        </div>
    </div>

    <!-- Скины -->
    <div class="skins-title">🎨 СМЕНИТЬ СКИН ОГУРЦА</div>
    <div class="skin-selector" id="skinContainer">
        <!-- динамически заполним JS -->
    </div>

    <!-- Тап-огурец -->
    <div class="tap-area">
        <div class="cucumber-tap" id="clickableCucumber">
            <div class="tap-emoji" id="cucumberEmoji">🥒</div>
        </div>
    </div>
    <div class="click-badge" id="tapMultiplierText">
        💪 Тап: +1
    </div>

    <!-- Улучшения -->
    <div class="upgrades-header">🛠️ УЛУЧШЕНИЯ</div>
    <div class="upgrades-grid" id="upgradesContainer"></div>

    <!-- Сброс -->
    <div class="reset-block">
        <button class="reset-btn" id="resetButton">🔄 Сбросить прогресс</button>
    </div>
    <div class="footer-note">
        Telegram Mini App • Огурцы правят миром
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- СОСТОЯНИЕ ----------
        let cucumbers = 0.0;
        let totalEarned = 0.0;           // всего заработано за всё время (для профиля)
        let clickMultiplier = 1;
        let passivePerSecond = 0.0;

        // Уровни улучшений
        let strongTapLevel = 0;           // макс 5
        const STRONG_MAX = 5;
        let autoClickerLevel = 0;
        let farmerLevel = 0;

        // Время игры (секунды)
        let playtimeSeconds = 0;
        
        // Скины
        const skins = [
            { id: 'classic', name: 'Классик', emoji: '🥒', price: 0, owned: true },
            { id: 'gold', name: 'Золотой', emoji: '✨🥒', price: 250, owned: false },
            { id: 'neon', name: 'Неоновый', emoji: '💚🥒', price: 600, owned: false },
            { id: 'fire', name: 'Огненный', emoji: '🔥🥒', price: 1200, owned: false }
        ];
        let activeSkinId = 'classic';

        // Цены
        const STRONG_BASE = 15;
        const AUTO_BASE = 30;
        const FARM_BASE = 100;

        // DOM элементы
        const counterSpan = document.getElementById('cucumberCounter');
        const perSecondDisplay = document.getElementById('perSecondDisplay');
        const cucumberEmoji = document.getElementById('cucumberEmoji');
        const tapMultiplierText = document.getElementById('tapMultiplierText');
        const playtimeDisplay = document.getElementById('playtimeDisplay');
        const totalEarnedDisplay = document.getElementById('totalEarnedDisplay');
        const balanceShort = document.getElementById('balanceShort');
        const upgradesContainer = document.getElementById('upgradesContainer');
        const skinContainer = document.getElementById('skinContainer');
        const clickableCucumber = document.getElementById('clickableCucumber');
        const resetBtn = document.getElementById('resetButton');

        let lastTimestamp = performance.now();
        let playtimeInterval = null;

        // ---------- ФУНКЦИИ ОТОБРАЖЕНИЯ ----------
        function formatCucumbers(value) {
            return Math.floor(value).toLocaleString();
        }
        function updateUI() {
            counterSpan.textContent = formatCucumbers(cucumbers);
            const short = formatCucumbers(cucumbers);
            balanceShort.textContent = short.length > 7 ? short.slice(0,6)+'…' : short;
            perSecondDisplay.textContent = `⏱️ ${passivePerSecond.toFixed(1)}/сек`;
            tapMultiplierText.textContent = `💪 Тап: +${clickMultiplier}`;
            totalEarnedDisplay.textContent = formatCucumbers(totalEarned);
            renderUpgrades();
            renderSkins();
        }

        // Пересчёт пассивки
        function recalcPassive() {
            passivePerSecond = autoClickerLevel * 1.0 + farmerLevel * 5.0;
        }

        // Время игры
        function updatePlaytimeDisplay() {
            const mins = Math.floor(playtimeSeconds / 60);
            const secs = Math.floor(playtimeSeconds % 60);
            playtimeDisplay.textContent = `${mins} мин ${secs.toString().padStart(2,'0')} сек`;
        }

        // Проверка на покупку
        function canAfford(cost) { return cucumbers >= cost; }
        function spend(amount) {
            if (cucumbers >= amount) {
                cucumbers -= amount;
                updateUI();
                return true;
            }
            return false;
        }

        // Добавление огурцов (и учёт общего заработка)
        function addCucumbers(amount) {
            cucumbers += amount;
            totalEarned += amount;
            updateUI();
        }

        // ---------- ПОКУПКИ ----------
        function buyStrongTap() {
            const cost = STRONG_BASE * (strongTapLevel + 1);
            if (strongTapLevel >= STRONG_MAX || !canAfford(cost)) return false;
            spend(cost);
            strongTapLevel++;
            clickMultiplier = 1 + strongTapLevel;
            updateUI();
            return true;
        }
        function buyAutoClicker() {
            const cost = AUTO_BASE * (autoClickerLevel + 1);
            if (!canAfford(cost)) return false;
            spend(cost);
            autoClickerLevel++;
            recalcPassive();
            updateUI();
            return true;
        }
        function buyFarmer() {
            const cost = FARM_BASE * (farmerLevel + 1);
            if (!canAfford(cost)) return false;
            spend(cost);
            farmerLevel++;
            recalcPassive();
            updateUI();
            return true;
        }

        // покупка скина
        function buySkin(skinId) {
            const skin = skins.find(s => s.id === skinId);
            if (!skin || skin.owned) return false;
            if (!canAfford(skin.price)) return false;
            spend(skin.price);
            skin.owned = true;
            activeSkinId = skinId;
            applySkin(skinId);
            updateUI();
            return true;
        }

        function applySkin(skinId) {
            const skin = skins.find(s => s.id === skinId) || skins[0];
            cucumberEmoji.textContent = skin.emoji;
            activeSkinId = skinId;
        }

        // ---------- РЕНДЕР ----------
        function renderSkins() {
            let html = '';
            skins.forEach(skin => {
                const isActive = (activeSkinId === skin.id);
                const owned = skin.owned;
                const canBuyNow = !owned && canAfford(skin.price);
                html += `
                    <div class="skin-option ${isActive ? 'active' : ''}" data-skin-id="${skin.id}">
                        <div class="skin-emoji">${skin.emoji}</div>
                        <div class="skin-name">${skin.name}</div>
                        <div class="skin-price">${owned ? '✅ куплен' : `💰 ${skin.price}`}</div>
                    </div>
                `;
            });
            skinContainer.innerHTML = html;
            document.querySelectorAll('[data-skin-id]').forEach(el => {
                el.addEventListener('click', (e) => {
                    const sid = el.getAttribute('data-skin-id');
                    const skin = skins.find(s => s.id === sid);
                    if (!skin) return;
                    if (skin.owned) {
                        activeSkinId = skin.id;
                        applySkin(skin.id);
                        renderSkins();
                    } else {
                        // попытка купить
                        if (buySkin(sid)) {
                            // UI обновлён
                        } else {
                            alert('Недостаточно огурцов! 🥒');
                        }
                    }
                });
            });
        }

        function renderUpgrades() {
            const strongCost = STRONG_BASE * (strongTapLevel + 1);
            const autoCost = AUTO_BASE * (autoClickerLevel + 1);
            const farmCost = FARM_BASE * (farmerLevel + 1);
            const strongMaxed = strongTapLevel >= STRONG_MAX;
            
            upgradesContainer.innerHTML = `
                <div class="upgrade-item">
                    <div class="upgrade-left">
                        <div class="upgrade-title">💪 Сила тапа <span style="font-size:0.9rem;">ур.${strongTapLevel}/${STRONG_MAX}</span></div>
                        <div class="upgrade-desc">Каждый тап +${clickMultiplier}</div>
                        <div class="upgrade-cost">${strongMaxed ? 'МАКС' : `💰 ${strongCost}`}</div>
                    </div>
                    <button class="buy-button ${(strongMaxed || !canAfford(strongCost)) ? 'disabled' : ''}" data-upgrade="strong">Купить</button>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-left">
                        <div class="upgrade-title">🤖 Огуречный бот <span>ур.${autoClickerLevel}</span></div>
                        <div class="upgrade-desc">+1 🥒/сек</div>
                        <div class="upgrade-cost">💰 ${autoCost}</div>
                    </div>
                    <button class="buy-button ${!canAfford(autoCost) ? 'disabled' : ''}" data-upgrade="auto">Купить</button>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-left">
                        <div class="upgrade-title">🏡 Ферма <span>ур.${farmerLevel}</span></div>
                        <div class="upgrade-desc">+5 🥒/сек</div>
                        <div class="upgrade-cost">💰 ${farmCost}</div>
                    </div>
                    <button class="buy-button ${!canAfford(farmCost) ? 'disabled' : ''}" data-upgrade="farmer">Купить</button>
                </div>
            `;
            document.querySelectorAll('[data-upgrade]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const type = btn.getAttribute('data-upgrade');
                    if (type === 'strong') buyStrongTap();
                    else if (type === 'auto') buyAutoClicker();
                    else if (type === 'farmer') buyFarmer();
                });
            });
        }

        // Клик по огурцу
        function handleTap() {
            addCucumbers(clickMultiplier);
            const el = clickableCucumber;
            el.style.transform = 'scale(0.92) rotate(-2deg)';
            setTimeout(() => el.style.transform = 'scale(1) rotate(-4deg)', 70);
        }

        // Игровой цикл (пассивный доход + время)
        function gameLoop(now) {
            const delta = (now - lastTimestamp) / 1000;
            if (delta > 0) {
                const earned = passivePerSecond * delta;
                if (earned > 0) {
                    cucumbers += earned;
                    totalEarned += earned;
                }
                lastTimestamp = now;
                updateUI();
            } else {
                lastTimestamp = now;
            }
            requestAnimationFrame(gameLoop);
        }

        // Таймер времени игры
        function startPlaytimeTimer() {
            if (playtimeInterval) clearInterval(playtimeInterval);
            playtimeInterval = setInterval(() => {
                playtimeSeconds++;
                updatePlaytimeDisplay();
            }, 1000);
        }

        // Сброс
        function resetGame() {
            cucumbers = 0.0;
            totalEarned = 0.0;
            clickMultiplier = 1;
            strongTapLevel = 0;
            autoClickerLevel = 0;
            farmerLevel = 0;
            passivePerSecond = 0;
            playtimeSeconds = 0;
            // скины: сброс владения кроме классик
            skins.forEach(s => { s.owned = (s.id === 'classic'); });
            activeSkinId = 'classic';
            applySkin('classic');
            
            lastTimestamp = performance.now();
            updatePlaytimeDisplay();
            updateUI();
        }

        // Инициализация
        function init() {
            resetGame();
            clickableCucumber.addEventListener('click', handleTap);
            resetBtn.addEventListener('click', resetGame);
            startPlaytimeTimer();
            requestAnimationFrame(gameLoop);
            // отображение скинов сразу
            renderSkins();
            applySkin('classic');
        }

        init();
    })();
</script>
</body>
</html>
